global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "cte-binance-connector"
    static_configs:
      - targets: ["binance-connector:8001"]
    metrics_path: "/api/connector/metrics"
    scrape_interval: 10s

  - job_name: "cte-bybit-connector"
    static_configs:
      - targets: ["bybit-connector:8002"]
    metrics_path: "/api/connector/metrics"
    scrape_interval: 10s

  - job_name: "cte-normalizer"
    static_configs:
      - targets: ["normalizer:8010"]
    metrics_path: "/api/normalizer/metrics"

  - job_name: "cte-feature-engine"
    static_configs:
      - targets: ["feature-engine:8020"]
    metrics_path: "/api/features/metrics"

  - job_name: "cte-signal-engine"
    static_configs:
      - targets: ["signal-engine:8030"]
    metrics_path: "/api/signals/metrics"

  - job_name: "cte-risk-manager"
    static_configs:
      - targets: ["risk-manager:8040"]
    metrics_path: "/api/risk/metrics"

  - job_name: "cte-sizing-engine"
    static_configs:
      - targets: ["sizing-engine:8050"]
    metrics_path: "/api/sizing/metrics"

  - job_name: "cte-execution-engine"
    static_configs:
      - targets: ["execution-engine:8060"]
    metrics_path: "/api/execution/metrics"

  - job_name: "cte-exit-engine"
    static_configs:
      - targets: ["exit-engine:8070"]
    metrics_path: "/api/exits/metrics"

  - job_name: "cte-analytics"
    static_configs:
      - targets: ["analytics:8080"]
    metrics_path: "/api/analytics/metrics"
